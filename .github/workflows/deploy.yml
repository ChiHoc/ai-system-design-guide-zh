name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: 读取并获取上游同步基线
        run: |
          UPSTREAM_COMMIT=$(node -p "require('./translation-state.json').upstream_commit")
          git fetch --no-tags https://github.com/ombharatiya/ai-system-design-guide.git "$UPSTREAM_COMMIT"
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - run: npm run docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .vitepress/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 发布
        id: deployment
        uses: actions/deploy-pages@v5
