name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: 读取并获取上游同步基线
        run: |
          UPSTREAM_COMMIT=$(node -p "require('./translation-state.json').upstream_commit")
          git fetch --no-tags https://github.com/ombharatiya/ai-system-design-guide.git "$UPSTREAM_COMMIT"
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - run: npm run docs:build
